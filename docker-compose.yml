services:
  mysql:
    image: mysql:8.4
    container_name: quadrafacil-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quadrafacil
      MYSQL_USER: quadrafacil
      MYSQL_PASSWORD: quadrafacil
    ports:
      - "3306:3306"
    volumes:
      - quadrafacil_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "quadrafacil", "-pquadrafacil"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  quadrafacil_mysql_data:
